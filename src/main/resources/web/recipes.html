<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>合成表编辑器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:Consolas,'Microsoft YaHei',sans-serif;font-size:12px;overflow:hidden;display:flex;flex-direction:column;height:100vh}
.toolbar{display:flex;align-items:center;gap:12px;padding:8px 12px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0}
.toolbar .tt{color:#c9d1d9;font-weight:700;font-size:13px}
.btn{padding:5px 12px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;border-radius:4px;cursor:pointer;font-size:11px;transition:all 0.15s}
.btn:hover{background:#30363d}
.btn-primary{background:#e94560;color:#fff;border-color:#e94560}
.btn-primary:hover{background:#c73750}
.btn-sm{padding:3px 8px;font-size:10px}
.main{display:flex;flex:1;overflow:hidden}
.panel{background:#161b22;border-right:1px solid #30363d;overflow-y:auto}
.left{flex:0 0 240px;display:flex;flex-direction:column}
.center{flex:1;overflow-y:auto;padding:16px}
.right{flex:0 0 280px;padding:12px;overflow-y:auto}
.search-box{background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;padding:6px 8px;font-size:11px;width:calc(100% - 16px);margin:8px}
.search-box:focus{outline:none;border-color:#e94560}
.item-row{padding:6px 10px;border-left:3px solid transparent;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;transition:0.15s;color:#b1bac4;font-size:11px}
.item-row:hover{background:#1a1f2b;color:#c9d1d9}
.item-row.active{border-left-color:#e94560;background:#1a1f2b;color:#e94560}
.item-row .iname{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-row .rtag{font-size:9px;color:#484f58;flex-shrink:0;max-width:86px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-row .rtag.none{color:#d29922}
.recipe-info{display:flex;gap:8px;align-items:center;padding:8px 16px;background:#1a2230;border-radius:6px;border:1px solid #30363d;font-size:12px;flex-wrap:wrap;justify-content:center}
.recipe-info .ri-name{color:#79c0ff;font-weight:600}
.recipe-info .ri-key{color:#8b949e;font-size:10px}
.recipe-info .ri-dots{color:#30363d;margin:0 4px}
.recipe-grid{display:grid;gap:6px;padding:14px;background:#0d1117;border-radius:8px;border:2px solid #30363d}
.slot{width:56px;height:56px;background:#21262d;border:2px dashed #30363d;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.2s;position:relative;font-size:10px;text-align:center;overflow:hidden;word-break:break-all;padding:2px;line-height:1.1}
.slot:hover{border-color:#e94560;background:#2a1f2e}
.slot.filled{border-style:solid;border-color:#30363d;background:#1a2230;color:#c9d1d9}
.oslot{width:64px;height:64px;background:#1a2f1a;border:2px solid #2ea043;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#3fb950;font-size:10px;gap:1px;overflow:hidden;text-align:center;line-height:1.1;padding:2px;word-break:break-all}
.oslot span{font-size:10px;color:#8b949e}
.arrow-dn{display:flex;align-items:center;justify-content:center;color:#484f58;font-size:20px;padding:2px}
.slabel{color:#b1bac4;font-size:10px;font-weight:600;margin-bottom:4px;margin-top:10px;text-transform:uppercase;letter-spacing:0.5px}
.type-list{background:#0d1117;border:1px solid #30363d;border-radius:4px;max-height:200px;overflow-y:auto}
.typeopt{padding:4px 8px;cursor:pointer;border-radius:3px;font-size:11px;color:#c9d1d9}
.typeopt:hover{background:#1a1f2b;color:#e6edf3}
.typeopt.active{background:#e9456022;color:#e94560}
.typeopt .tns{color:#8b949e;font-size:10px}
.time-box{margin-top:8px;display:none}
.time-box.show{display:block}
.time-box input{width:80px;padding:4px 8px;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;font-size:12px}
.out-item{background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:5px 8px;color:#3fb950;font-size:11px;cursor:pointer}
.out-item span{color:#8b949e;font-size:10px}
.yaml-preview{background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:8px;font-size:10px;max-height:120px;overflow-y:auto;white-space:pre;font-family:Consolas,monospace;color:#7ee787}
.debug-panel{background:#0d1117;border-top:1px solid #30363d;padding:4px 12px;font-size:9px;color:#484f58;max-height:100px;overflow-y:auto;white-space:pre-wrap;font-family:Consolas,monospace;flex-shrink:0}
.debug-panel .dl-warn{color:#d29922}
.debug-panel .dl-error{color:#f85149}
.debug-panel .dl-info{color:#58a6ff}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99}
.overlay.show{display:block}
.popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;max-height:500px;background:#161b22;border:1px solid #30363d;border-radius:8px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.6);flex-direction:column}
.popup.show{display:flex}
.popup-hdr{padding:10px;border-bottom:1px solid #30363d}
.popup-body{overflow-y:auto;max-height:380px;padding:6px}
.popup-item{padding:6px 8px;cursor:pointer;border-radius:4px;color:#c9d1d9;font-size:11px;display:flex;justify-content:space-between;align-items:center}
.popup-item:hover{background:#1a1f2b}
.popup-item .pid{color:#8b949e;font-size:10px;margin-left:8px}
.popup-item .p-type{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:600;margin-right:6px;flex-shrink:0}
.popup-item .p-type.sf{background:#1f6feb;color:#fff}
.popup-item .p-type.van{background:#3fb950;color:#fff}
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:6px;font-size:12px;z-index:200;display:none;animation:toastIn 0.3s}
.toast-success{background:#238636;border:1px solid #2ea043}
.toast-error{background:#da3633;border:1px solid #f85149}
.rtab{padding:3px 8px;cursor:pointer;border:1px solid #30363d;border-radius:3px;font-size:10px;color:#b1bac4;background:#21262d;transition:0.15s;white-space:nowrap}
.rtab:hover{background:#30363d;color:#e6edf3}
.rtab.active{background:#e9456022;border-color:#e94560;color:#e94560}
.rtab-del{color:#f85149;margin-left:2px;cursor:pointer;font-size:11px;line-height:1}
.rtab-del:hover{color:#ff7b72}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
</style></head><body>
<div class="toolbar">
  <span class="tt">合成表编辑器</span>
  <span id="save-badge" style="font-size:10px;background:#1a2f1a;color:#3fb950;padding:2px 8px;border-radius:8px;">已保存</span>
  <span style="flex:1"></span>
  <span style="color:#8b949e;font-size:10px;">ctrl+S 保存</span>
  <button class="btn btn-sm" onclick="revertFromServer()" title="放弃当前所有修改并重新加载服务器数据">↶ 不保存</button>
  <button class="btn btn-primary btn-sm" onclick="save()">保存</button>
</div>
<div class="main">
  <div class="panel left">
    <input class="search-box" placeholder="搜索ID/名称..." oninput="filterItems(this.value)" id="item-search">
    <div id="item-list" style="flex:1;overflow-y:auto;"></div>
  </div>
  <div class="center" id="center-panel" style="display:none;"></div>
  <div style="text-align:center;color:#484f58;padding-top:60px;flex:1;overflow-y:auto;" id="center-empty">请选择左侧物品</div>
  <div class="panel right" id="right-panel" style="display:none;">
    <div style="font-weight:700;font-size:13px;margin-bottom:10px;">配方属性</div>
    <div class="slabel">配方列表 <button class="btn btn-sm" style="margin-left:4px;padding:2px 6px;font-size:10px;" onclick="addRecipe()" title="添加配方">+</button></div>
    <div id="recipe-tabs" style="display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap;align-items:center;"></div>
    <div class="slabel">合成方式</div>
    <div class="type-list" id="type-list" style="margin-bottom:12px;"></div>
    <div id="time-row" class="time-box">
      <div class="slabel">加工时间 (tick)</div>
      <input type="number" id="edit-time" min="1" value="0" onchange="changeTime(this.value)">
    </div>
    <div class="slabel">输出物品</div>
    <div class="out-item" onclick="openPicker('output')" id="output-display" style="margin-bottom:8px;"></div>
    <div class="slabel">输出数量</div>
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;">
      <button class="btn btn-sm" onclick="changeAmount(-1)">-</button>
      <span id="amount-display" style="font-size:15px;min-width:24px;text-align:center;">1</span>
      <button class="btn btn-sm" onclick="changeAmount(1)">+</button>
    </div>
    <div class="slabel">Recipes.yml 预览</div>
    <div class="yaml-preview" id="yaml-preview"></div>
    <div style="margin-top:12px;display:flex;gap:6px;">
      <button class="btn" style="flex:1" onclick="revertItem()">↶ 放弃修改</button>
      <button class="btn btn-primary" style="flex:1" onclick="save()">保存</button>
    </div>
  </div>
</div>
<div class="debug-panel" id="debug-panel"></div>

<div class="overlay" id="overlay" onclick="closePicker()"></div>
<div class="popup" id="popup">
  <div class="popup-hdr">
    <input class="search-box" placeholder="搜索物品(原版+SF)..." oninput="doPopupSearch()" id="popup-search" style="margin:0;width:100%;">
    <div style="font-size:9px;color:#484f58;margin-top:4px;">原版 + Slimefun 物品</div>
  </div>
  <div class="popup-body" id="popup-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var API_TOKEN = sessionStorage.getItem('scg_token') || '';
if (API_TOKEN) sessionStorage.setItem('scg_token', API_TOKEN);
var nativeFetch = window.fetch.bind(window);
window.fetch = function(input, init) {
  init = init || {};
  init.headers = init.headers || {};
  if (API_TOKEN) init.headers['X-slimefunweaver-Token'] = API_TOKEN;
  return nativeFetch(input, init);
};

var DLOG = [];
function dlog(tag, msg) {
  var ts = new Date().toISOString().slice(11,23);
  var entry = '[' + ts + '] [' + tag + '] ' + msg;
  DLOG.push(entry);
  if (DLOG.length > 200) DLOG.shift();
  $id('debug-panel').innerHTML = DLOG.map(function(e){
    var cls = e.indexOf('[WARN]') >= 0 ? 'dl-warn' : (e.indexOf('[ERR]') >= 0 ? 'dl-error' : 'dl-info');
    return '<span class="' + cls + '">' + esc(e) + '</span>';
  }).join('\n');
  $id('debug-panel').scrollTop = $id('debug-panel').scrollHeight;
}
function dlogErr(tag, msg) { dlog(tag, '[ERR] ' + msg); }

var MC = {
  colors: {0:'#000000',1:'#0000AA',2:'#00AA00',3:'#00AAAA',4:'#AA0000',5:'#AA00AA',6:'#FFAA00',7:'#AAAAAA',8:'#555555',9:'#5555FF',a:'#55FF55',b:'#55FFFF',c:'#FF5555',d:'#FF55FF',e:'#FFFF55',f:'#FFFFFF'},
  _isColorChar: function(c) { return c === '\u00a7' || c === '&'; },
  parseToHtml: function(text) {
    if (!text) return '';
    var out = '', i = 0, style = '';
    while (i < text.length) {
      if (MC._isColorChar(text[i]) && i + 1 < text.length) {
        var code = text[i+1].toLowerCase();
        if (code === 'r') style = '';
        else if (code === 'l') style += 'font-weight:bold;';
        else if (code === 'm') style += 'text-decoration:line-through;';
        else if (code === 'n') style += 'text-decoration:underline;';
        else if (code === 'o') style += 'font-style:italic;';
        else if (code === 'k') style += '';
        else if (MC.colors[code]) style += 'color:' + MC.colors[code] + ';';
        i += 2; continue;
      }
      out += style ? '<span style="' + style + '">' + MC.escapeHtml(text[i]) + '</span>' : MC.escapeHtml(text[i]);
      i++;
    }
    return out;
  },
  strip: function(text) {
    if (!text) return '';
    var out = '', i = 0;
    while (i < text.length) {
      if (MC._isColorChar(text[i]) && i + 1 < text.length) { i += 2; continue; }
      out += text[i]; i++;
    }
    return out;
  },
  escapeHtml: function(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
};

var itemData = {}, recipeTypes = [], itemNames = {}, allItems = [], selectedItemId = null, dirty = false, saving = false, dirtyVersion = 0;
var currentTypeKey = '', slots = [], outputItemId = '', outputItemName = '', amount = 1, processingTime = 0;
var recipeIndex = 0, recipesData = [];
var pickerTarget = 'slot', pickerSlotIdx = -1;
var popupCache = [];
var originalItemName = '';

function $id(id) { return document.getElementById(id); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
// 内部工具，数据源为Slimefun注册表，无XSS威胁
function escKey(k) { return (k||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'\\r'); }
function isNullRecipeType(key) { return !key || key === 'null' || /:null$/i.test(key); }
function shortRecipeType(key) { return isNullRecipeType(key) ? '无配方' : key.split(':').pop(); }

function saveCurrentRecipeState() {
  if (recipeIndex < 0 || recipeIndex >= recipesData.length) return;
  recipesData[recipeIndex] = {
    type: currentTypeKey,
    input: slots.map(function(s){return s?s.id:'AIR';}),
    output: outputItemId,
    outputAmount: amount,
    processingTime: processingTime
  };
}

function loadRecipeState(idx) {
  if (idx < 0 || idx >= recipesData.length) return;
  var r = recipesData[idx];
  currentTypeKey = r.type || '';
  slots = (r.input||[]).map(function(inp){return {id:inp, name:resolveName(inp)};});
  outputItemId = r.output || selectedItemId;
  outputItemName = resolveName(outputItemId);
  amount = r.outputAmount || 1;
  processingTime = r.processingTime || 0;
  recipeIndex = idx;
}

function selectRecipe(idx) {
  if (idx === recipeIndex) return;
  saveCurrentRecipeState();
  loadRecipeState(idx);
  renderTypeList();
  renderGrid();
  updateYaml();
  renderRecipeTabs();
}

function addRecipe() {
  saveCurrentRecipeState();
  var types = recipeTypes.filter(function(t){return !isNullRecipeType(t.key);});
  var defaultType = types.length > 0 ? types[0].key : '';
  recipesData.push({type: defaultType, input: [], output: selectedItemId, outputAmount: 1, processingTime: 0});
  loadRecipeState(recipesData.length - 1);
  setDirty(true);
  renderTypeList();
  renderGrid();
  updateYaml();
  renderRecipeTabs();
}

function deleteRecipe(idx) {
  if (recipesData.length <= 1) { showToast('至少保留一个配方','info'); return; }
  if (idx < 0 || idx >= recipesData.length) return;
  recipesData.splice(idx, 1);
  if (recipeIndex >= recipesData.length) recipeIndex = recipesData.length - 1;
  loadRecipeState(recipeIndex);
  setDirty(true);
  renderTypeList();
  renderGrid();
  updateYaml();
  renderRecipeTabs();
}

function renderRecipeTabs() {
  var html = '';
  for (var i = 0; i < recipesData.length; i++) {
    var r = recipesData[i];
    var typeLabel = shortRecipeType(r.type);
    html += '<div class="rtab' + (i === recipeIndex ? ' active' : '') + '" onclick="selectRecipe(' + i + ')">配方' + (i+1) + ' <span style="font-size:9px;color:#8b949e">' + typeLabel + '</span>';
    if (recipesData.length > 1) html += '<span class="rtab-del" onclick="event.stopPropagation();deleteRecipe(' + i + ')">✕</span>';
    html += '</div>';
  }
  $id('recipe-tabs').innerHTML = html;
}

function loadAll() {
  dlog('INIT', 'loadAll: fetching /api/recipes');
  return fetch('/api/recipes').then(function(r){return r.json()}).then(function(json){
    itemData = json.items || {};
    recipeTypes = json.recipeTypes || [];
    itemNames = json.names || {};
    dlog('INIT', 'loaded ' + Object.keys(itemData).length + ' items, ' + recipeTypes.length + ' recipe types');
    allItems = [];
    Object.keys(itemData).forEach(function(k){
      allItems.push({id:k, name:itemData[k].name||k, rt:itemData[k].currentRecipeType||''});
    });
    allItems.sort(function(a,b){return MC.strip(a.name).localeCompare(MC.strip(b.name))});
    renderItemList('');
  }).catch(function(e){
    dlogErr('INIT', 'loadAll failed: ' + e.message);
    showToast('加载失败: '+e.message,'error');
  });
}

function renderItemList(filter) {
  var q = (filter||'').toLowerCase(), h = '';
  allItems.forEach(function(it){
    var stripName = MC.strip(it.name).toLowerCase();
    if (q && it.id.toLowerCase().indexOf(q)<0 && stripName.indexOf(q)<0) return;
    var rtShort = shortRecipeType(it.rt);
    var rtClass = isNullRecipeType(it.rt) ? 'rtag none' : 'rtag';
    h+='<div class="item-row'+(selectedItemId===it.id?' active':'')+'" data-id="'+it.id+'" onclick="selectItem(\''+escKey(it.id)+'\')">'
      +'<span class="iname">'+MC.parseToHtml(it.name)+'</span><span class="'+rtClass+'">'+esc(rtShort)+'</span></div>';
  });
  $id('item-list').innerHTML = h || '<div style="padding:12px;color:#484f58;text-align:center;">无匹配</div>';
}

function filterItems(v) { renderItemList(v); }

var pendingSelectTimer = null;

function setDirty(v) {
  if (v) dirtyVersion++;
  dirty = !!v;
  var bag = $id('save-badge');
  if (!bag) return;
  if (saving) return;
  if (dirty) { bag.textContent = '未保存'; bag.style.background='#2a1a1a'; bag.style.color='#f85149'; }
  else { bag.textContent = '已保存'; bag.style.background='#1a2f1a'; bag.style.color='#3fb950'; }
}

function selectItem(id) {
  if (saving) { showToast('正在保存，请稍后再切换物品','info'); return; }
  if (dirty && selectedItemId !== id && !confirm('当前合成表有未保存修改，确定切换物品并丢弃这些修改？')) return;
  if (selectedItemId === id) { if (dirty) return; doSelectItem(id); return; }
  if (pendingSelectTimer) clearTimeout(pendingSelectTimer);
  $id('center-empty').style.display = 'none';
  $id('center-panel').style.display = '';
  $id('center-panel').innerHTML = '<div style="text-align:center;color:#484f58;padding-top:60px;">加载中...</div>';
  pendingSelectTimer = setTimeout(function(){ setDirty(false); doSelectItem(id); }, 40);
}

function doSelectItem(id) {
  if (saving) return;
  dlog('SELECT', 'selectItem: ' + id + ' (prev=' + selectedItemId + ')');
  selectedItemId = id;
  var d = itemData[id];
  if (!d) {
    dlogErr('SELECT', 'item not found in itemData: ' + id);
    $id('center-empty').style.display = 'block';
    $id('center-panel').style.display = 'none';
    $id('right-panel').style.display = 'none';
    return;
  }
  originalItemName = d.name || '';
  dlog('SELECT', 'item name=' + MC.strip(d.name) + ' rt=' + (d.currentRecipeType||'null') + ' recipes.length=' + (d.recipes ? d.recipes.length : 0));
  renderItemList($id('item-search').value);

  var serverRecipes = d.recipes || [];
  if (serverRecipes.length > 0 && !isNullRecipeType(serverRecipes[0].type)) {
    recipesData = serverRecipes.map(function(r) {
      return {
        type: r.type || '',
        input: r.input || [],
        output: r.output || d.id,
        outputAmount: r.outputAmount || 1,
        processingTime: r.processingTime || 0
      };
    });
  } else {
    var defType = isNullRecipeType(d.currentRecipeType) ? '' : (d.currentRecipeType || '');
    var defInput = defType ? (d.currentRecipe||[]) : [];
    recipesData = [{type: defType, input: defInput, output: d.id, outputAmount: 1, processingTime: 0}];
  }

  recipeIndex = 0;
  loadRecipeState(0);
  if (slots.length === 0 && currentTypeKey) slots = [null];

  $id('right-panel').style.display = 'block';
  $id('center-empty').style.display = 'none';
  renderRecipeTabs();
  renderTypeList();
  renderGrid();
  updateYaml();
}

function resolveName(id) {
  if (!id || id === 'AIR') return '空';
  if (itemData[id]) return itemData[id].name||id;
  if (itemNames[id]) return itemNames[id];
  return id;
}

function resolveDisplayName(id) {
  return MC.parseToHtml(resolveName(id));
}

function renderGrid() {
  var info = getTypeInfo(currentTypeKey);
  var cols = info.cols, total = info.slots;
  while (slots.length < total) slots.push(null);

  var h = '';
  h += '<div class="recipe-info">';
  h += '<span class="ri-name">' + MC.parseToHtml(info.name) + '</span>';
  h += '<span class="ri-dots">|</span>';
  h += '<span class="ri-key">' + esc(currentTypeKey) + '</span>';
  h += '<span class="ri-dots">|</span>';
  h += '<span>输入 ' + total + ' 格</span>';
  h += '<span class="ri-dots">|</span>';
  h += '<span>输出 1 格</span>';
  if (info.hasTime && processingTime > 0) h += '<span class="ri-dots">|</span><span>耗时 ' + processingTime + ' tick</span>';
  h += '</div>';

  if (total > 0) {
    h += '<div class="recipe-grid" style="grid-template-columns:repeat('+cols+', 56px);">';
    for (var i = 0; i < total; i++) {
      var s = slots[i];
      var cl = s && s.id !== 'AIR' ? 'slot filled' : 'slot';
      var inner = s && s.id !== 'AIR' ? resolveDisplayName(s.id) : '<span style="font-size:18px;color:#484f58;">+</span>';
      h += '<div class="'+cl+'" onclick="openSlotPicker('+i+')">'+inner+'</div>';
    }
    h += '</div>';
    h += '<div class="arrow-dn">↓</div>';
  } else {
    h += '<div style="padding:18px;text-align:center;color:#d29922;background:#1a1608;border:1px solid #3b2f0b;border-radius:8px;">该物品当前没有可编辑合成方式，请先在右侧选择一种合成方式</div>';
  }
  h += '<div class="oslot">' + resolveDisplayName(outputItemId) + '<span>×' + amount + '</span></div>';

  $id('center-panel').innerHTML = h;

  var out = $id('output-display');
  out.innerHTML = MC.parseToHtml(outputItemName) + ' <span>(' + esc(outputItemId) + ')</span>';
  $id('amount-display').textContent = amount;
  $id('edit-time').value = processingTime || 0;
  $id('time-row').className = 'time-box' + (info.hasTime ? ' show' : '');
}

function getTypeInfo(key) {
  if (isNullRecipeType(key)) return {name:'未设置合成方式', slots:0, cols:1, hasTime:false};
  var found = recipeTypes.find(function(t){return t.key===key;});
  var name = found ? found.name : (key||'');
  var hasTime = found ? !!found.hasTime : false;
  var totalSlots = found && found.slots ? found.slots : (slots && slots.length > 0 ? slots.length : 1);
  if (!found && slots.length === 9) totalSlots = 9; else if (!found && slots.length === 4) totalSlots = 4; else if (!found && slots.length === 2) totalSlots = 2;
  var cols = totalSlots === 9 ? 3 : (totalSlots === 4 ? 2 : (totalSlots === 2 ? 2 : 1));
  return {name:name, slots:totalSlots, cols:cols, hasTime:hasTime};
}

function renderTypeList() {
  var h = '';
  recipeTypes.forEach(function(t){
    if (isNullRecipeType(t.key)) return;
    var builtinTag = t.isBuiltin ? '' : ' <span style="color:#d29922;font-size:9px;">addon</span>';
    h += '<div class="typeopt'+(t.key===currentTypeKey?' active':'')+'" onclick="changeType(\''+escKey(t.key)+'\')">'
      + esc(t.name) + builtinTag + ' <span class="tns">' + esc(t.key) + '</span></div>';
  });
  $id('type-list').innerHTML = h;
  $id('edit-time').value = processingTime || 0;
  $id('time-row').className = 'time-box' + (getTypeInfo(currentTypeKey).hasTime ? ' show' : '');
}

function changeType(key) {
  if (saving) return;
  dlog('CHANGE', 'changeType: ' + currentTypeKey + ' -> ' + key);
  currentTypeKey = key;
  var info = getTypeInfo(key);
  while (slots.length < info.slots) slots.push(null);
  trimOverflowSlots();
  renderTypeList();
  renderGrid();
  updateYaml();
  setDirty(true);
}

function visibleSlots() {
  return getTypeInfo(currentTypeKey).slots;
}

function trimOverflowSlots() {
  var total = visibleSlots();
  if (slots.length > total) slots = slots.slice(0, total);
}

function changeTime(val) {
  if (saving) return;
  var t = parseInt(val) || 0;
  processingTime = Math.max(0, t);
  dlog('CHANGE', 'changeTime: ' + processingTime + ' tick');
  renderGrid();
  updateYaml();
  setDirty(true);
}

function openSlotPicker(idx) {
  if (saving) return;
  pickerTarget = 'slot'; pickerSlotIdx = idx;
  $id('overlay').classList.add('show'); $id('popup').classList.add('show');
  $id('popup-search').value = ''; loadPopupMaterials('');
  dlog('PICKER', 'openSlotPicker idx=' + idx);
}

function openPicker(target) {
  if (saving) return;
  pickerTarget = target; pickerSlotIdx = -1;
  $id('overlay').classList.add('show'); $id('popup').classList.add('show');
  $id('popup-search').value = ''; loadPopupMaterials('');
  dlog('PICKER', 'openPicker target=' + target);
}

var popupTimer = null;
function doPopupSearch() {
  if (popupTimer) clearTimeout(popupTimer);
  popupTimer = setTimeout(function(){ loadPopupMaterials($id('popup-search').value); }, 200);
}

function loadPopupMaterials(q) {
  var body = $id('popup-body');
  if (!(q||'').trim()) {
    popupCache = [];
    body.innerHTML = '<div style="color:#8b949e;text-align:center;padding:16px;">输入关键词搜索 (原版 + Slimefun 物品)</div>';
    return;
  }
  body.innerHTML = '<div style="color:#8b949e;text-align:center;padding:16px;">搜索中...</div>';
  var url = '/api/recipes/materials?q=' + encodeURIComponent(q||'');
  dlog('API', 'GET ' + url);
  fetch(url).then(function(r){return r.json()}).then(function(json){
    popupCache = json.results || [];
    dlog('API', 'materials result count: ' + popupCache.length);
    renderPopupList();
  }).catch(function(e){
    dlogErr('API', 'materials fetch failed: ' + e.message);
    body.innerHTML = '<div style="color:#f85149;text-align:center;padding:16px;">加载失败</div>';
  });
}

function renderPopupList() {
  var body = $id('popup-body'), h = '';
  popupCache.forEach(function(it){
    var typeLabel = it.type === 'SLIMEFUN' ? 'SF' : '原版';
    var typeClass = it.type === 'SLIMEFUN' ? 'sf' : 'van';
    h += '<div class="popup-item" onclick="pickMaterial(\''+escKey(it.id)+'\',\''+escKey(it.display)+'\')">'
      + '<span style="display:flex;align-items:center;gap:6px;"><span class="p-type '+typeClass+'">'+typeLabel+'</span>'+MC.parseToHtml(it.display)+'</span>'
      + '<span class="pid">'+esc(it.id)+'</span></div>';
  });
  body.innerHTML = h || '<div style="color:#8b949e;text-align:center;padding:16px;">输入关键词搜索 (原版 + Slimefun 物品)</div>';
}

function pickMaterial(id, name) {
  if (saving) { closePicker(); return; }
  dlog('PICKER', 'pickMaterial: ' + id + ' target=' + pickerTarget + ' slotIdx=' + pickerSlotIdx);
  if (pickerTarget === 'output') {
    outputItemId = id; outputItemName = name;
  } else if (pickerTarget === 'slot' && pickerSlotIdx >= 0) {
    trimOverflowSlots();
    slots[pickerSlotIdx] = {id:id, name:name};
  }
  closePicker();
  renderGrid();
  updateYaml();
  setDirty(true);
}

function closePicker() {
  $id('overlay').classList.remove('show'); $id('popup').classList.remove('show');
}

function changeAmount(d) {
  if (saving) return;
  amount = Math.max(1, Math.min(64, amount + d));
  $id('amount-display').textContent = amount;
  renderGrid();
  updateYaml();
  setDirty(true);
}

function updateYaml() {
  saveCurrentRecipeState();
  var validRecipes = recipesData.filter(function(r){return !isNullRecipeType(r.type);});
  if (validRecipes.length === 0) {
    $id('yaml-preview').innerHTML = '<span style="color:#d29922;">请选择有效合成方式后预览 Recipes.yml</span>';
    return;
  }
  var y = '<span style="color:#ff7b72;">slimefun:</span>\n  <span style="color:#ff7b72;">'+esc(selectedItemId)+':</span>\n    <span style="color:#ff7b72;">recipes:</span>';
  for (var i = 0; i < validRecipes.length; i++) {
    var r = validRecipes[i];
    var info = getTypeInfo(r.type);
    var inputList = r.input || [];
    var timeLine = '';
    if (info && info.hasTime && r.processingTime > 0) {
      timeLine = '\n        <span style="color:#ff7b72;">processing-time:</span> <span style="color:#79c0ff;">'+r.processingTime+'</span>';
    }
    y += '\n      - <span style="color:#ff7b72;">type:</span> <span style="color:#a5d6ff;">'+esc(r.type)+'</span>\n        <span style="color:#ff7b72;">input:</span> <span style="color:#a5d6ff;">['+inputList.map(function(x){return '\''+esc(x)+'\''}).join(', ')+']</span>\n        <span style="color:#ff7b72;">output:</span> <span style="color:#a5d6ff;">'+esc(r.output)+'</span>\n        <span style="color:#ff7b72;">output-amount:</span> <span style="color:#79c0ff;">'+r.outputAmount+'</span>'+timeLine;
  }
  $id('yaml-preview').innerHTML = y;
}

function revertItem() {
  if (saving) { showToast('正在保存，请稍后再放弃修改','info'); return; }
  if (!selectedItemId) { showToast('请先选择物品','info'); return; }
  dlog('REVERT', 'reverting item ' + selectedItemId + ' from server');
  var d = itemData[selectedItemId];
  if (d) {
    var serverRecipes = d.recipes || [];
    if (serverRecipes.length > 0 && !isNullRecipeType(serverRecipes[0].type)) {
      recipesData = serverRecipes.map(function(r) {
        return {
          type: r.type || '',
          input: r.input || [],
          output: r.output || d.id,
          outputAmount: r.outputAmount || 1,
          processingTime: r.processingTime || 0
        };
      });
    } else {
      var defType = isNullRecipeType(d.currentRecipeType) ? '' : (d.currentRecipeType || '');
      var defInput = defType ? (d.currentRecipe||[]) : [];
      recipesData = [{type: defType, input: defInput, output: d.id, outputAmount: 1, processingTime: 0}];
    }
    recipeIndex = 0;
    loadRecipeState(0);
    if (slots.length === 0 && currentTypeKey) slots = [null];
    renderRecipeTabs();
    renderTypeList();
    renderGrid();
    updateYaml();
    setDirty(false);
    originalItemName = outputItemName;
    showToast('已放弃修改','success');
  }
}

function revertFromServer() {
  if (saving) { showToast('正在保存，请稍后再重新加载','info'); return; }
  dlog('REVERT', 'revertFromServer: full reload from server');
  selectedItemId = null;
  $id('right-panel').style.display = 'none';
  $id('center-empty').style.display = 'block';
  $id('center-panel').style.display = 'none';
  $id('center-panel').innerHTML = '';
  loadAll().then(function() { setDirty(false); showToast('已从服务器重新加载','success'); });
}

function save() {
  if (!selectedItemId) { showToast('请先选择物品','error'); return; }
  if (saving) return;
  saveCurrentRecipeState();
  var hasValidRecipe = false;
  for (var i = 0; i < recipesData.length; i++) {
    if (!isNullRecipeType(recipesData[i].type)) { hasValidRecipe = true; break; }
  }
  if (!hasValidRecipe) { showToast('请至少为一个配方选择有效合成方式','error'); return; }
  saving = true;
  var bag = $id('save-badge');
  bag.textContent = '保存中...'; bag.style.background='#2a1a1a'; bag.style.color='#f85149';

  var savingItemId = selectedItemId;
  var savingItemName = originalItemName;
  var savingDirtyVersion = dirtyVersion;
  var recipeList = recipesData.filter(function(r){return !isNullRecipeType(r.type);}).map(function(r){
    return {type: r.type, input: r.input, output: r.output, outputAmount: r.outputAmount || 1, processingTime: r.processingTime || 0};
  });
  var firstRecipe = recipeList[0];
  var payload = {items:{}};
  payload.items[savingItemId] = {recipes: recipeList};

  dlog('SAVE', 'saving ' + savingItemId + ' with ' + recipeList.length + ' recipes');
  var body = JSON.stringify(payload);
  dlog('SAVE', 'PUT /api/recipes body=' + body.substring(0, 200));

  fetch('/api/recipes', {method:'PUT', headers:{'Content-Type':'application/json'}, body:body}).then(function(r){
    if (!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(){
    itemData[savingItemId] = {
      id: savingItemId, name: savingItemName,
      currentRecipeType: firstRecipe.type,
      currentRecipe: firstRecipe.input.slice(),
      recipes: recipeList
    };
    for (var i = 0; i < allItems.length; i++) {
      if (allItems[i].id === savingItemId) {
        allItems[i].rt = firstRecipe.type;
        break;
      }
    }
    saving = false;
    if (selectedItemId === savingItemId && dirtyVersion === savingDirtyVersion) {
      setDirty(false);
      bag.textContent = '已保存 · 实时生效'; bag.style.background='#1a2f1a'; bag.style.color='#3fb950';
    } else if (dirty) {
      bag.textContent = '未保存'; bag.style.background='#2a1a1a'; bag.style.color='#f85149';
    }
    dlog('SAVE', 'save success, ' + recipeList.length + ' recipes applied');
    showToast('合成表已更新 · 实时生效','success');
  }).catch(function(e){
    saving = false;
    bag.textContent = '保存失败'; bag.style.background='#2a1a1a'; bag.style.color='#f85149';
    dlogErr('SAVE', 'save failed: ' + e.message);
    showToast('保存失败: '+e.message,'error');
  });
}

window.addEventListener('beforeunload', function(e){ if (dirty) { e.preventDefault(); e.returnValue = ''; } });

function showToast(msg, type) {
  var t = $id('toast'); t.textContent = msg; t.className = 'toast toast-'+(type||'info');
  t.style.display = 'block'; setTimeout(function(){t.style.display='none';},2500);
}

document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') closePicker();
  if ((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();save();}
});

loadAll();
</script></body></html>
