<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>研究编辑器 v8 - API</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
#toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#161b22;border-bottom:1px solid #21262d;flex-shrink:0}
#toolbar .title{font-size:14px;font-weight:600;color:#e94560}
.toolbar-actions{display:flex;align-items:center;gap:8px}
.toolbar-stats{display:flex;gap:14px;font-size:11px;color:#8b949e}
.toolbar-stats span strong{color:#c9d1d9}
.btn{padding:6px 14px;border:1px solid #30363d;border-radius:6px;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:12px;transition:0.15s}
.btn:hover{background:#30363d}
.btn-primary{background:#e94560;border-color:#e94560;color:#fff;font-weight:500}
.btn-danger{background:#da3633;border-color:#da3633;color:#fff}
.btn-sm{padding:3px 9px;font-size:11px}
.btn-xs{padding:2px 6px;font-size:10px}
#main{display:flex;flex:1;overflow:hidden;position:relative}
#left-panel{width:260px;min-width:220px;background:#161b22;border-right:1px solid #21262d;display:flex;flex-direction:column}
.panel-header{padding:9px 11px;border-bottom:1px solid #21262d;font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:0.5px;display:flex;justify-content:space-between}
#research-search{margin:6px 9px;padding:6px 9px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:12px;outline:none}
#research-search:focus{border-color:#e94560}
#research-list{flex:1;overflow-y:auto}
.r-item{padding:7px 11px;cursor:pointer;border-left:3px solid transparent;font-size:12px;transition:0.1s;display:flex;flex-direction:column;gap:1px}
.r-item:hover{background:#1c2129;border-left-color:#30363d}
.r-item.active{background:rgba(233,69,96,0.12);border-left-color:#e94560}
.r-item.unsaved{background:rgba(63,185,80,0.08);border-left-color:#3fb950}
.r-name{font-weight:500}
.r-key{font-size:10px;color:#484f58;font-family:'SF Mono','Consolas',monospace}
.r-items-wrap{display:flex;flex-wrap:wrap;gap:2px;margin-top:1px}
.r-tag{background:#21262d;padding:1px 5px;border-radius:3px;font-size:9px;color:#58a6ff;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r-status{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap}
.r-status-tag{font-size:8px;padding:1px 4px;border-radius:3px;font-weight:500}
.has-parents-bg{background:rgba(31,111,235,0.15);color:#388bfd}
.no-parents-bg{background:rgba(72,79,88,0.3);color:#8b949e}
.has-children-bg{background:rgba(63,185,80,0.15);color:#3fb950}
.no-children-bg{background:rgba(72,79,88,0.3);color:#8b949e}
#center-panel{flex:1;display:flex;flex-direction:column;background:#0d1117;overflow:hidden}
#center-top{flex:0 0 220px;border-bottom:1px solid #21262d;display:flex;flex-direction:column;padding:8px 12px}
#ct-section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
#ct-section-title{font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase}
#items-grid-wrapper{flex:1;overflow-y:auto}
#items-grid{display:grid;grid-template-columns:repeat(auto-fill,100px);gap:5px}
.item-cell{background:#161b22;border:1px solid #21262d;border-radius:6px;padding:6px;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center;position:relative;min-height:56px}
.item-cell .item-icon{font-size:18px}
.item-cell .item-name{color:#c9d1d9}
.item-cell .item-id{color:#484f58;font-size:9px;font-family:'SF Mono','Consolas',monospace}
#ct-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#484f58;font-size:12px}
#center-bottom{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#cb-header{padding:7px 12px;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#cb-title{font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase}
.graph-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.graph-toolbar .zoom-info{font-size:10px;color:#484f58;min-width:46px;text-align:right}
.graph-toolbar .hint{font-size:10px;color:#d2991d}
#canvas-container{flex:1;overflow:hidden;position:relative;cursor:grab;user-select:none;-webkit-user-select:none}
#canvas-container:active,#canvas-container.panning{cursor:grabbing}
#graph-world{position:absolute;top:0;left:0;width:12000px;height:20000px;transform-origin:0 0;user-select:none;-webkit-user-select:none}
#graph-svg{position:absolute;top:0;left:0;width:12000px;height:20000px;z-index:2;pointer-events:none}
#graph-svg g.arrow{pointer-events:auto;cursor:pointer}
#graph-svg path.viz{fill:none;stroke:#30363d;stroke-width:2;pointer-events:none}
#graph-svg path.hit{fill:none;stroke:transparent;stroke-width:12;pointer-events:auto}
#graph-nodes{position:absolute;top:0;left:0;width:12000px;height:20000px;z-index:3;user-select:none;-webkit-user-select:none;pointer-events:none}
#graph-svg g.arrow.sel path.viz{stroke:#e94560;stroke-width:3;filter:drop-shadow(0 0 4px rgba(233,69,96,0.5))}
#graph-svg g.arrow.unsaved path.viz{stroke:#3fb950;stroke-width:2.5;filter:drop-shadow(0 0 3px rgba(63,185,80,0.4))}
#graph-svg g.arrow.hl-red path.viz{stroke:#e94560;stroke-width:2}
#graph-svg g.arrow.hl-blue path.viz{stroke:#58a6ff;stroke-width:2}
#graph-svg g.arrow.hl-yellow path.viz{stroke:#d2991d;stroke-width:2}
#graph-svg g.arrow.hl-green path.viz{stroke:#3fb950;stroke-width:2}
#graph-svg g.arrow.hl-sky path.viz{stroke:#5bc0de;stroke-width:2}
.gnode{position:absolute;background:#161b22;border:2px solid #30363d;border-radius:8px;min-width:175px;max-width:210px;transition:0.15s;cursor:pointer;user-select:none;-webkit-user-select:none;pointer-events:auto}
.gnode:hover{border-color:#e94560;box-shadow:0 0 12px rgba(233,69,96,0.2);z-index:20!important}
.gnode.selected{border-color:#e94560;box-shadow:0 0 0 2px rgba(233,69,96,0.4);z-index:15!important}
.gnode.related-red{border-color:#e94560;box-shadow:0 0 0 1px rgba(233,69,96,0.25)}
.gnode.related-blue{border-color:#58a6ff;box-shadow:0 0 0 1px rgba(88,166,255,0.2)}
.gnode.related-yellow{border-color:#d2991d;box-shadow:0 0 0 1px rgba(210,153,29,0.2)}
.gnode.related-sky{border-color:#5bc0de;box-shadow:0 0 0 1px rgba(91,192,222,0.2)}
.gnode.related-green{border-color:#3fb950;box-shadow:0 0 0 1px rgba(63,185,80,0.2)}
.gnode.no-deps{border-style:dashed;border-color:rgba(72,79,88,0.5)}
.gnode.unsaved{border-color:#3fb950;background:rgba(63,185,80,0.06)}
.gnode .gn-hdr{padding:5px 9px;border-bottom:1px solid #21262d;font-weight:600;font-size:11px;color:#e94560;display:flex;justify-content:space-between}
.gnode .gn-hdr .gn-key{font-size:9px;color:#484f58;font-family:'SF Mono',monospace;font-weight:400}
.gnode .gn-body{padding:5px 9px}
.gnode .gn-body .gn-item{font-size:9px;color:#58a6ff;margin:0.5px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gnode .gn-body .gn-item-more{font-size:9px;color:#484f58;margin:1px 0}
.gnode .gn-port{width:14px;height:14px;border-radius:50%;background:#21262d;border:2px solid #484f58;position:absolute;top:50%;transform:translateY(-50%);z-index:5;cursor:crosshair;transition:0.15s;pointer-events:auto}
.gnode .gn-port-in{left:-8px}
.gnode .gn-port-out{right:-8px}
.gnode .gn-port:hover{background:#e94560;border-color:#e94560;box-shadow:0 0 8px rgba(233,69,96,0.5);transform:translateY(-50%) scale(1.3)}
.gnode .gn-port.connecting{background:#3fb950;border-color:#3fb950;animation:pulse-port 0.6s infinite}
@keyframes pulse-port{0%,100%{box-shadow:0 0 4px rgba(63,185,80,0.5)}50%{box-shadow:0 0 12px rgba(63,185,80,0.9)}}
#right-panel{width:290px;min-width:250px;background:#161b22;border-left:1px solid #21262d;display:flex;flex-direction:column;overflow-y:auto}
#editor-form{padding:10px;flex:1}
#editor-empty{padding:10px;color:#484f58;font-size:12px;text-align:center;margin-top:50px}
.form-group{margin-bottom:10px}
.form-group label:not(.tgl-wrap){display:block;font-size:10px;font-weight:600;color:#8b949e;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.3px}
.form-group input[type=text],.form-group input[type=number]{width:100%;padding:5px 8px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:11px;font-family:'SF Mono','Consolas',monospace}
.form-group input:focus{border-color:#e94560;outline:none;box-shadow:0 0 0 2px rgba(233,69,96,0.15)}
.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1;margin-bottom:6px}
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.skill-item{display:flex;align-items:center;gap:4px;font-size:10px}
.skill-item input{width:44px!important;padding:2px 4px!important;font-size:10px!important}
.dep-section{border:1px solid #21262d;border-radius:6px;padding:7px}
.dep-hdr{font-size:10px;font-weight:600;color:#8b949e;margin-bottom:5px}
.dep-item{display:flex;align-items:center;justify-content:space-between;padding:3px 5px;background:#0d1117;border-radius:4px;margin-bottom:3px;font-size:11px}
.dep-item.unsaved{background:rgba(63,185,80,0.08);border:1px solid rgba(63,185,80,0.2)}
.dep-name{color:#58a6ff}
.yaml-preview{border-top:2px solid #e94560;padding:8px;font-family:'SF Mono','Consolas',monospace;font-size:10px;color:#c9d1d9;background:#0d1117;white-space:pre-wrap;max-height:160px;overflow-y:auto}
.yaml-preview .yaml-key{color:#58a6ff}
.yaml-preview .yaml-val{color:#3fb950}
.yaml-preview .yaml-comment{color:#484f58}
#arrow-delete-bar{display:none;position:fixed;top:50px;left:50%;transform:translateX(-50%);background:#161b22;border:1px solid #e94560;border-radius:6px;padding:6px 14px;z-index:500;font-size:11px;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
#arrow-delete-bar.show{display:flex}
.tgl-wrap{display:flex;align-items:center;gap:8px}
.tgl{position:relative;display:inline-block;width:36px;height:18px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tgl-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#30363d;border-radius:18px;transition:0.2s}
.tgl-slider::before{content:'';position:absolute;height:12px;width:12px;left:3px;bottom:3px;background:#c9d1d9;border-radius:50%;transition:0.2s}
.tgl input:checked+.tgl-slider{background:#e94560}
.tgl input:checked+.tgl-slider::before{transform:translateX(18px)}
.color-picker-popup{display:none;position:fixed;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.6);width:260px}
.color-picker-popup.show{display:block}
.cp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:6px}
.cp-cell{padding:4px 6px;border-radius:4px;cursor:pointer;font-size:11px;text-align:center;font-family:'SF Mono',monospace;border:1px solid transparent;transition:0.1s}
.cp-cell:hover{border-color:#e94560}
.cp-format{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.cp-fmt{padding:3px 6px;border-radius:4px;cursor:pointer;font-size:10px;text-align:center;font-family:'SF Mono',monospace;border:1px solid #30363d;color:#c9d1d9}
.cp-fmt:hover{background:#21262d;border-color:#e94560}
#toast{position:fixed;top:12px;right:16px;z-index:600;padding:8px 16px;border-radius:8px;color:#fff;font-size:12px;box-shadow:0 4px 16px rgba(0,0,0,0.4);display:none}
.toast-success{background:#238636;border:1px solid #2ea043}
.toast-info{background:#1f6feb;border:1px solid #388bfd}
.toast-error{background:#da3633;border:1px solid #f85149}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px rgba(233,69,96,0.3)}50%{box-shadow:0 0 16px 4px rgba(233,69,96,0.6)}}
.gnode.flash{animation:pulse 0.5s ease-in-out 3}
</style></head><body>
<div id="app">
<div id="toolbar">
  <span class="title">📖 研究编辑器 v8 — <span id="stat-total-dynamic">364</span>条真实数据 (Researches.yml)</span>
  <div class="toolbar-stats">
    <span>共 <strong id="stat-total">-</strong> 个研究</span>
    <span>含物品 <strong id="stat-items">-</strong> 个</span>
    <span class="stat-warn">孤立 <strong id="stat-orphan">-</strong></span>
    <span class="stat-ok">依赖 <strong id="stat-deps">-</strong></span>
  </div>
  <div class="toolbar-actions">
    <button class="btn btn-sm" onclick="discardChanges()">↶ 放弃修改</button>
    <button class="btn btn-sm btn-primary" id="btn-save-researches" onclick="saveResearches()">💾 保存</button>
  </div>
</div>
<div id="main" style="position:relative">
<div id="left-panel">
  <div class="panel-header"><span>📁 研究列表</span><span style="font-size:9px;color:#484f58">🟢=新建</span></div>
  <input id="research-search" type="text" placeholder="搜索ID/物品名..." oninput="filterResearch()"/>
  <div id="research-list"></div>
</div>
<div id="center-panel">
  <div id="center-top">
    <div id="ct-section-header">
      <span id="ct-section-title">📦 请选择左侧研究</span>
      <button class="btn btn-xs" id="btn-add-item" onclick="showItemPicker()">+ 添加物品</button>
    </div>
    <div id="items-grid-wrapper"><div id="items-grid"></div><div id="ct-empty" style="display:flex">← 选择左侧研究</div></div>
  </div>
  <div id="center-bottom">
    <div id="cb-header">
      <span id="cb-title">🔗 依赖关系图 (261节点 · 坐标=autoLayout计算)</span>
      <div class="graph-toolbar">
        <span class="hint">🖱 拖拽●右→●左连线</span>
        <button class="btn btn-xs" onclick="fitView()">🔍 适配</button>
        <button class="btn btn-xs" onclick="autoLayout()">📐 布局</button>
        <span class="zoom-info" id="zoom-level">100%</span>
      </div>
    </div>
    <div id="canvas-container">
      <div id="graph-world"><svg id="graph-svg"></svg><div id="graph-nodes"></div></div>
    </div>
  </div>
</div>
<div id="right-panel">
  <div class="panel-header"><span>✏ 研究属性</span><span id="edit-research-key" style="font-size:9px;color:#484f58"></span></div>
  <div id="editor-empty" style="display:block"><div style="font-size:28px;margin-bottom:6px;opacity:0.5">📋</div><div>点击左侧/图中节点编辑</div></div>
  <div id="editor-form" style="display:none">
    <div class="form-group"><label>研究ID</label><input type="text" id="edit-key" disabled/><span id="edit-namespaced" style="font-size:10px;color:#484f58;margin-top:2px;display:inline-block"></span></div>
    <div class="form-group"><label>本地化译名</label><input type="text" id="edit-locname" disabled/><div id="loc-preview" style="margin-top:5px;padding:6px;background:#0d1117;border-radius:4px;border:1px solid #30363d;font-size:11px;min-height:20px"></div><div style="font-size:9px;color:#d29922;margin-top:3px">当前仅预览，暂不写入语言文件</div></div>
    <div class="form-row"><div class="form-group"><label>经验</label><input type="number" id="edit-levelcost" min="0" oninput="onCostChange()"/></div><div class="form-group"><label>金钱</label><input type="number" id="edit-moneycost" min="0" step="0.01" oninput="onCostChange()"/></div></div>
    <div class="form-group"><label>AuraSkills</label><div class="skill-grid" id="skill-grid"></div></div>
    <div class="form-group"><label>启用</label><div class="tgl-wrap"><label class="tgl"><input type="checkbox" id="edit-enabled" checked onchange="onEnabledToggle()"/><span class="tgl-slider"></span></label><span id="enabled-label" style="font-size:11px">已启用</span></div></div>
    <div class="form-group"><label>前置依赖</label><div class="dep-section"><div class="dep-hdr">前置 (<span id="parents-count">0</span>)</div><div id="parents-list"></div></div></div>
    <div class="form-group"><label>后代依赖</label><div class="dep-section"><div id="children-list"></div></div></div>
  </div>
  <div class="yaml-preview" id="yaml-preview" style="display:none"></div>
</div>
</div>
</div>
<div id="arrow-delete-bar"><span id="arrow-info"></span><button class="btn btn-xs btn-danger" onclick="deleteSelectedArrow()">🗑 删除</button><button class="btn btn-xs" onclick="deselectArrow()">✕</button></div>
<div class="color-picker-popup" id="color-picker"></div>
<div id="toast"></div>
<div class="color-picker-popup" id="item-picker-popup" style="width:340px;max-height:360px;overflow-y:auto">
  <div style="font-size:11px;font-weight:600;color:#e94560;margin-bottom:6px">🔍 研究物品预览</div>
  <div style="font-size:10px;color:#d29922;margin-bottom:6px">当前不支持保存物品归属修改</div>
  <input type="text" id="item-picker-search" placeholder="搜索物品ID或名称..." style="width:100%;padding:5px 8px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:11px;margin-bottom:6px" oninput="searchItems()" onkeydown="if(event.key==='Escape')hideItemPicker()"/>
  <div id="item-picker-results" style="font-size:10px;max-height:260px;overflow-y:auto"></div>
  <button class="btn btn-xs" style="margin-top:6px;width:100%" onclick="hideItemPicker()">✕ 关闭</button>
</div>
<script>
var API_TOKEN = sessionStorage.getItem('scg_token') || '';
if (API_TOKEN) sessionStorage.setItem('scg_token', API_TOKEN);
var nativeFetch = window.fetch.bind(window);
window.fetch = function(input, init) {
  init = init || {};
  init.headers = init.headers || {};
  if (API_TOKEN) {
    init.headers['X-slimefunweaver-Token'] = API_TOKEN;
  }
  return nativeFetch(input, init);
};
// ═══ MC Color Parser ═══
var MC={
  colors:{0:'#000',1:'#00A',2:'#0A0',3:'#0AA',4:'#A00',5:'#A0A',6:'#FA0',7:'#AAA',8:'#555',9:'#55F',a:'#5F5',b:'#5FF',c:'#F55',d:'#F5F',e:'#FF5',f:'#FFF'},
  colorNames:{0:'黑',1:'深蓝',2:'深绿',3:'青',4:'深红',5:'紫',6:'金',7:'浅灰',8:'深灰',9:'蓝',a:'亮绿',b:'亮青',c:'红',d:'粉',e:'黄',f:'白'},
  formatCodes:{l:'粗体',m:'删除线',n:'下划线',o:'斜体',r:'重置'},
  parseToHtml:function(t){
    if(!t)return'';var o='',i=0,s='';
    while(i<t.length){
      if((t[i]==='\u00a7'||t[i]==='&')&&t[i+1]){var c=t[i+1];
        if((c==='x'||c==='X')&&i+13<t.length){var m=t[i],h='',v=true;for(var j=2;j<=13;j+=2){if(t[i+j]!==m){v=false;break}var hd=t[i+j+1];if(!/[0-9a-fA-F]/.test(hd)){v=false;break}h+=hd}if(v){s+='color:#'+h+';';i+=14;continue}}
        if('0123456789abcdefABCDEFklmnor'.indexOf(c)>=0){c=c.toLowerCase();if(c==='r')s='';else if(c==='l')s+='font-weight:bold;';else if(c==='m')s+='text-decoration:line-through;';else if(c==='n')s+='text-decoration:underline;';else if(c==='o')s+='font-style:italic;';else if(MC.colors[c])s+='color:'+MC.colors[c]+';';i+=2;continue}}o+='<span style="'+s+'">'+MC.escapeHtml(t[i])+'</span>';i++}return o},
  escapeHtml:function(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
};


// ============ DATA: loaded from API ============
var researches = [];
var itemToResearch = {};
var dirty = false, savingResearches = false, dirtyVersion = 0;

function escapeKey(k) { return k.replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;"); }
function stripNS(fk) { var p = fk.split(":"); return p.length > 1 ? p.slice(1).join(":") : p[0]; }
function escJS(s){if(!s)return'';return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'\\r')}
function apiToInternal(apiJson) {
  itemToResearch = apiJson.itemToResearch || {};
  var list = (apiJson.researches || []).map(function(r) {
    var fullKey = r.fullKey || ((r.namespace || 'slimefun') + ':' + r.key);
    return {key: fullKey, shortKey: r.key, fullKey: fullKey, namespace: r.namespace, name: r.name, levelCost: r.levelCost, moneyCost: r.moneyCost, enabled: r.enabled, items: r.items || [], parents: r.parents || [], needUnlockedItems: r.needUnlockedItems || [], descendants: [], skills: {mining: r.miningLevelNeed || 0, farming: r.farmingLevelNeed || 0, foraging: r.foragingLevelNeed || 0, fishing: r.fishingLevelNeed || 0, excavation: r.excavationLevelNeed || 0, archery: r.archeryLevelNeed || 0, defense: r.defenseLevelNeed || 0, fighting: r.fightingLevelNeed || 0, agility: r.agilityLevelNeed || 0, enchanting: r.enchantingLevelNeed || 0, alchemy: r.alchemyLevelNeed || 0}, x: 0, y: 0};
  });
  list.forEach(function(r) { r.parents.forEach(function(pk) { var pr = list.find(function(rr) { return rr.key === pk; }); if (pr && pr.descendants.indexOf(r.key) < 0) pr.descendants.push(r.key); }); });
  return list;
}
function loadResearches() {
  return fetch("/api/researches").then(function(r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); }).then(function(json) { researches = apiToInternal(json); updateToolbarStats(); return researches; });
}
function clampResearch(r){r.levelCost=Math.max(0,parseInt(r.levelCost)||0);r.moneyCost=Math.max(0,parseFloat(r.moneyCost)||0);Object.keys(r.skills||{}).forEach(function(k){r.skills[k]=Math.max(0,parseInt(r.skills[k])||0)});return r}
function saveResearches() {
  if(savingResearches)return;
  savingResearches=true;var btn=document.getElementById('btn-save-researches');if(btn){btn.disabled=true;btn.textContent='保存中...'}
  var savingDirtyVersion = dirtyVersion;
  var payload = {researches: researches.map(function(r) {
    clampResearch(r);
    var needItems = (r.needUnlockedItems || []).filter(function(id) { var mapped = itemToResearch[id]; return !mapped || r.parents.indexOf(mapped) >= 0; });
    r.parents.forEach(function(pk) { if (!needItems.some(function(id) { return itemToResearch[id] === pk; })) { var pr = researches.find(function(rr) { return rr.key === pk; }); if (pr && pr.items[0]) needItems.push(pr.items[0].id); } });
    return {fullKey: r.fullKey || r.key, levelCost: r.levelCost, moneyCost: r.moneyCost, enabled: r.enabled, needUnlockedItems: needItems, miningLevelNeed: r.skills.mining || 0, farmingLevelNeed: r.skills.farming || 0, foragingLevelNeed: r.skills.foraging || 0, fishingLevelNeed: r.skills.fishing || 0, excavationLevelNeed: r.skills.excavation || 0, archeryLevelNeed: r.skills.archery || 0, defenseLevelNeed: r.skills.defense || 0, fightingLevelNeed: r.skills.fighting || 0, agilityLevelNeed: r.skills.agility || 0, enchantingLevelNeed: r.skills.enchanting || 0, alchemyLevelNeed: r.skills.alchemy || 0};
  })};
  return fetch("/api/researches", {method: "PUT", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload)}).then(function(r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); }).then(function() { if(dirtyVersion===savingDirtyVersion){researches.forEach(function(r){var saved=payload.researches.find(function(p){return p.fullKey === (r.fullKey || r.key)});r.needUnlockedItems = saved ? saved.needUnlockedItems : (r.needUnlockedItems || [])});unsaved = {newResearches: new Set(), newDeps: new Set()};clearDirty()}else if(btn){btn.disabled=false;btn.textContent='💾 保存 *'}savingResearches=false;buildResearchList(document.getElementById("research-search").value); renderGraph(); showToast("保存成功", "success"); }).catch(function(e) { savingResearches=false;if(btn){btn.disabled=false;btn.textContent='💾 保存 *'} showToast("保存失败: " + e.message, "error"); });
}

// ═══ GRAPH: path-based coloring (BFS up/down from selected) ═══
function pathTrace(key){
  var empty={up:{},down:{},red:new Set(),green:new Set(),yellow:new Set(),sky:new Set()};
  if(!key)return empty;
  var up={},down={};up[key]=0;down[key]=0;
  // BFS upward: follow parents (prerequisite chain)
  var uq=[key];
  while(uq.length>0){
    var ck=uq.shift(),cr=researches.find(function(rr){return rr.key===ck});if(!cr)continue;
    cr.parents.forEach(function(pk){if(up[pk]===undefined){up[pk]=up[ck]+1;uq.push(pk)}});
  }
  // BFS downward: follow descendants (dependent chain)
  var dq=[key];
  while(dq.length>0){
    var ck=dq.shift(),cr=researches.find(function(rr){return rr.key===ck});if(!cr)continue;
    cr.descendants.forEach(function(dk){if(down[dk]===undefined){down[dk]=down[ck]+1;dq.push(dk)}});
  }
  var red=new Set(),yellow=new Set(),green=new Set(),sky=new Set();
  for(var k in up){if(up[k]===1)red.add(k);else if(up[k]>=2)yellow.add(k)}
  for(var k in down){if(down[k]===1)green.add(k);else if(down[k]>=2)sky.add(k)}
  return{up:up,down:down,red:red,green:green,yellow:yellow,sky:sky};
}

function renderGraph(){
  var nodesDiv=document.getElementById('graph-nodes'),svg=document.getElementById('graph-svg');
  var cl=selectedResearch?pathTrace(selectedResearch.key):{red:new Set(),green:new Set(),yellow:new Set(),sky:new Set(),up:{},down:{}};
  var h='';
  researches.forEach(function(r){
    var isSel=selectedResearch&&selectedResearch.key===r.key;
    var relC='';
    if(!isSel){
      if(cl.red.has(r.key))relC=' related-red';
      else if(cl.green.has(r.key))relC=' related-green';
      else if(cl.yellow.has(r.key))relC=' related-yellow';
      else if(cl.sky.has(r.key))relC=' related-sky';
    }
    var itemNames=r.items.map(function(it){return MC.escapeHtml(it.name)});
    var itemH=itemNames.slice(0,4).map(function(n){return'<div class="gn-item">'+n+'</div>'}).join('');
    if(itemNames.length>4)itemH+='<div class="gn-item-more">...+'+(itemNames.length-4)+'个</div>';
    h+='<div class="gnode'+(isSel?' selected':'')+relC+'" style="left:'+r.x+'px;top:'+r.y+'px" data-key="'+escapeKey(r.key)+'" onclick="selectResearch(\''+escapeKey(r.key)+'\')">'
      +'<div class="gn-hdr"><span>'+MC.escapeHtml(r.name)+'</span><span class="gn-key">'+MC.escapeHtml(r.shortKey||r.key)+'</span></div>'
      +'<div class="gn-body">'+itemH+'</div>'
      +'<div class="gn-port gn-port-in" data-node="'+escapeKey(r.key)+'" title="拖到这里"></div>'
      +'<div class="gn-port gn-port-out" data-node="'+escapeKey(r.key)+'" title="拖拽连线" onmousedown="startDragConnect(event,\''+escapeKey(r.key)+'\')"></div></div>';
  });
  nodesDiv.innerHTML=h;

  var svgH='<defs><marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#30363d"/></marker><marker id="ah-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e94560"/></marker><marker id="ah-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#3fb950"/></marker><marker id="ah-sky" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#5bc0de"/></marker><marker id="ah-yellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#d2991d"/></marker></defs>';
  researches.forEach(function(r){
    r.parents.forEach(function(pk){
      var p=researches.find(function(pr){return pr.key===pk});if(!p)return;
      var x1=p.x+180,y1=p.y+35,x2=r.x,y2=r.y+35,dx=x2-x1,dy=y2-y1;
      var k=Math.min(0.45,Math.max(0.25,Math.abs(dy)/(Math.abs(dx)+1)*0.3+0.25));
      var d='M '+x1+','+y1+' C '+(x1+dx*k).toFixed(0)+','+y1+' '+(x2-dx*k).toFixed(0)+','+y2+' '+x2+','+y2;
      var fromKey=pk,toKey=r.key;
      var isArrowSel=(selectedArrow&&selectedArrow.fromKey===fromKey&&selectedArrow.toKey===toKey);
      var isNewDep=unsaved.newDeps.has(fromKey+'\u2192'+toKey);

      var ac='';
      if(selectedResearch&&!isArrowSel){
        var upFrom=cl.up[fromKey],upTo=cl.up[toKey],downFrom=cl.down[fromKey],downTo=cl.down[toKey];
        if(upFrom!==undefined&&upTo!==undefined&&upFrom===upTo+1){
          ac=upTo===0?'hl-red':'hl-yellow';
        }else if(downFrom!==undefined&&downTo!==undefined&&downTo===downFrom+1){
          ac=downFrom===0?'hl-green':'hl-sky';
        }
      }

      var marker='url(#ah)';
      if(isArrowSel)marker='url(#ah-red)';else if(ac==='hl-red')marker='url(#ah-red)';
      else if(ac==='hl-green')marker='url(#ah-green)';else if(ac==='hl-sky')marker='url(#ah-sky)';else if(ac==='hl-yellow')marker='url(#ah-yellow)';

      var clS='arrow'+(isArrowSel?' sel':'')+(isNewDep?' unsaved':'')+(ac?' '+ac:'');
      svgH+='<g class="'+clS+'" data-from="'+fromKey+'" data-to="'+toKey+'" onclick="onArrowClick(event,\''+fromKey+'\',\''+toKey+'\')">';
      svgH+='<path class="viz" d="'+d+'" marker-end="'+marker+'"/><path class="hit" d="'+d+'"/></g>';
    });
  });
  svg.innerHTML=svgH;

  var bar=document.getElementById('arrow-delete-bar');
  if(selectedArrow){var fr=researches.find(function(rr){return rr.key===selectedArrow.fromKey}),to=researches.find(function(rr){return rr.key===selectedArrow.toKey});document.getElementById('arrow-info').textContent='依赖: '+(fr?fr.name:selectedArrow.fromKey)+' → '+(to?to.name:selectedArrow.toKey);bar.classList.add('show')}else bar.classList.remove('show');
}
function onArrowClick(e,fromKey,toKey){e.stopPropagation();if(selectedArrow&&selectedArrow.fromKey===fromKey&&selectedArrow.toKey===toKey)deselectArrow();else{selectedArrow={fromKey:fromKey,toKey:toKey};renderGraph()}}
function deselectArrow(){selectedArrow=null;renderGraph()}
function deleteSelectedArrow(){
  if(!selectedArrow)return;var from=researches.find(function(r){return r.key===selectedArrow.fromKey}),to=researches.find(function(r){return r.key===selectedArrow.toKey});
  if(from){var di=from.descendants.indexOf(selectedArrow.toKey);if(di>=0)from.descendants.splice(di,1)}if(to){var pi=to.parents.indexOf(selectedArrow.fromKey);if(pi>=0)to.parents.splice(pi,1)}
  unsaved.newDeps.delete(selectedArrow.fromKey+'\u2192'+selectedArrow.toKey);selectedArrow=null;markDirty();
  autoLayout();if(selectedResearch){renderRightPanel();autoScrollToNode(selectedResearch.key)}buildResearchList(document.getElementById('research-search').value);showToast('已删除依赖','info')
}
function startDragConnect(e,fromKey){e.stopPropagation();e.preventDefault();var r=researches.find(function(rr){return rr.key===fromKey});if(!r)return;dragConnect={active:true,fromKey:fromKey,fromPortX:r.x+180,fromPortY:r.y+35}}
window.addEventListener('mousemove',function(e){if(!dragConnect.active)return;document.querySelectorAll('.gn-port-in').forEach(function(p){p.classList.remove('connecting')});var target=document.elementFromPoint(e.clientX,e.clientY);if(target&&target.classList.contains('gn-port-in'))target.classList.add('connecting')});
window.addEventListener('mouseup',function(e){
  if(!dragConnect.active)return;document.querySelectorAll('.gn-port-in').forEach(function(p){p.classList.remove('connecting')});var target=document.elementFromPoint(e.clientX,e.clientY),toKey=null;if(target&&target.classList.contains('gn-port-in'))toKey=target.getAttribute('data-node');
  if(toKey&&toKey!==dragConnect.fromKey){var from=researches.find(function(r){return r.key===dragConnect.fromKey}),to=researches.find(function(r){return r.key===toKey});
    if(from&&to&&from.descendants.indexOf(toKey)<0&&to.parents.indexOf(dragConnect.fromKey)<0){
      function hasPath(s,t,vis){if(!vis)vis=new Set();if(vis.has(s))return false;vis.add(s);if(s===t)return true;var r=researches.find(function(rr){return rr.key===s});if(!r)return false;return r.descendants.some(function(dk){return hasPath(dk,t,vis)})}
      if(!hasPath(toKey,dragConnect.fromKey)){from.descendants.push(toKey);to.parents.push(dragConnect.fromKey);unsaved.newDeps.add(dragConnect.fromKey+'\u2192'+toKey);markDirty();
        autoLayout();buildResearchList(document.getElementById('research-search').value);if(selectedResearch&&(selectedResearch.key===dragConnect.fromKey||selectedResearch.key===toKey)){renderRightPanel();autoScrollToNode(selectedResearch.key)}
        showToast('🟢 新依赖: '+from.name+' → '+to.name,'success')}else showToast('⚠ 循环依赖','info')}}
  dragConnect={active:false,fromKey:null,fromPortX:0,fromPortY:0}
});

// ═══ ZOOM & PAN ═══
function applyTransform(){document.getElementById('graph-world').style.transform='translate('+graphOffsetX+'px,'+graphOffsetY+'px) scale('+graphScale+')';document.getElementById('zoom-level').textContent=Math.round(graphScale*100)+'%'}
var container=document.getElementById('canvas-container');
container.addEventListener('wheel',function(e){e.preventDefault();var d=e.deltaY>0?-0.1:0.1,ns=Math.max(0.05,Math.min(2,graphScale+d)),rect=container.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top,r=ns/graphScale;graphOffsetX=mx-(mx-graphOffsetX)*r;graphOffsetY=my-(my-graphOffsetY)*r;graphScale=ns;applyTransform()});
container.addEventListener('mousedown',function(e){if(dragConnect.active)return;if(e.target===container||e.target.classList.contains('hit')||e.target.id==='graph-svg'||e.target.id==='graph-world'||e.target.id==='graph-nodes'){isPanning=true;panStartX=e.clientX-graphOffsetX;panStartY=e.clientY-graphOffsetY;container.classList.add('panning')}});
window.addEventListener('mousemove',function(e){if(!isPanning)return;graphOffsetX=e.clientX-panStartX;graphOffsetY=e.clientY-panStartY;applyTransform()});
window.addEventListener('mouseup',function(){isPanning=false;container.classList.remove('panning')});
window.addEventListener('beforeunload',function(e){if(dirty){e.preventDefault();e.returnValue=''}});

// ═══ LAYOUT: auto-calculate all coordinates ═══
function autoLayout(){
  var dm={};
  function gd(key,vis){if(!vis)vis=new Set();if(vis.has(key))return 0;vis.add(key);if(dm[key]!==undefined)return dm[key];var r=researches.find(function(rr){return rr.key===key});if(!r||r.parents.length===0){dm[key]=0;return 0}var md=0;r.parents.forEach(function(pk){var d=gd(pk,vis);if(d>=md)md=d+1});dm[key]=md;return md}
  var layers={};researches.forEach(function(r){var d=gd(r.key);if(!layers[d])layers[d]=[];layers[d].push(r.key)});
  var xG=250,yG=85;Object.keys(layers).sort(function(a,b){return a-b}).forEach(function(depth,di){var keys=layers[depth];keys.forEach(function(key,ki){var r=researches.find(function(rr){return rr.key===key});r.x=30+di*xG;r.y=30+ki*yG})});
  renderGraph();fitView()
}
function fitView(){
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  researches.forEach(function(r){if(r.x<minX)minX=r.x;if(r.y<minY)minY=r.y;if(r.x+220>maxX)maxX=r.x+220;if(r.y+100>maxY)maxY=r.y+100});
  var w=maxX-minX+200,h=maxY-minY+200,cw=container.clientWidth,ch=container.clientHeight;graphScale=Math.min(cw/w,ch/h,1);if(graphScale<0.04)graphScale=0.04;
  graphOffsetX=(cw-w*graphScale)/2-minX*graphScale;graphOffsetY=(ch-h*graphScale)/2-minY*graphScale;applyTransform()
}
function autoScrollToNode(key){
  var r=researches.find(function(rr){return rr.key===key});if(!r)return;
  document.querySelectorAll('.gnode').forEach(function(n){n.classList.remove('flash')});var tn=document.querySelector('.gnode[data-key="'+key+'"]');if(tn)tn.classList.add('flash');
  var cw=container.clientWidth,ch=container.clientHeight,tx=cw/2-(r.x+90)*graphScale,ty=ch/2-(r.y+40)*graphScale,sx=graphOffsetX,sy=graphOffsetY,st=null;
  function anim(ts){if(!st)st=ts;var p=Math.min((ts-st)/400,1),e=1-Math.pow(1-p,3);graphOffsetX=sx+(tx-sx)*e;graphOffsetY=sy+(ty-sy)*e;applyTransform();if(p<1)requestAnimationFrame(anim)}requestAnimationFrame(anim)
}
function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast-'+(type||'info');t.style.display='block';setTimeout(function(){t.style.display='none'},2500)}

function updateToolbarStats(){
  var total=researches.length,items=0,orphans=0,depCnt=0;
  researches.forEach(function(r){
    items+=r.items.length;
    if(r.parents.length===0&&r.descendants.length===0)orphans++;
    if(r.parents.length>0||r.descendants.length>0)depCnt++;
  });
  var st=document.getElementById('stat-total');if(st)st.textContent=total;
  var si=document.getElementById('stat-items');if(si)si.textContent=items;
  var so=document.getElementById('stat-orphan');if(so)so.textContent=orphans;
  var sd=document.getElementById('stat-deps');if(sd)sd.textContent=depCnt;
  var std=document.getElementById('stat-total-dynamic');if(std)std.textContent=total;
}

// ═══ INIT ═══
loadResearches().then(function() {
  buildResearchList('');
  autoLayout();
  console.log('v8: '+researches.length+' 条研究已从API加载');
}).catch(function(e) {
  console.error('加载失败:', e);
  document.getElementById('research-list').innerHTML = '<div style="padding:16px;color:#f85149">加载失败: ' + e.message + '</div>';
});
</script></body></html>
