<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlimefunCustomGuide 配置编辑器</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="title">SlimefunCustomGuide 配置编辑器</span>
    <div class="toolbar-actions">
      <button id="btn-save" class="btn btn-primary" onclick="saveAll()">保存</button>
      <button id="btn-export" class="btn" onclick="alert('请在游戏内使用 /scg export 导出')">导出</button>
    </div>
  </div>
  <div id="main">
    <div id="left-panel">
      <div id="left-toolbar">
        <button class="btn btn-sm" onclick="addCategory()">+分类</button>
        <button class="btn btn-sm" onclick="addPlaceholder()">+占位</button>
        <button class="btn btn-sm" onclick="openItemPickerForAdd()">+物品</button>
      </div>
      <div id="tree-container">
        <ul id="tree-root"></ul>
      </div>
    </div>
    <div id="center-panel">
      <div id="grid-header">
        <span id="grid-title">请选择左侧分类</span>
        <div id="grid-page-controls" style="display:none;">
          <button class="btn btn-sm" onclick="prevPage()">&#9664;</button>
          <span id="grid-page-info">第 1/1 页</span>
          <button class="btn btn-sm" onclick="nextPage()">&#9654;</button>
        </div>
      </div>
      <div id="grid-container">
        <div id="grid"></div>
      </div>
    </div>
    <div id="right-panel">
      <div id="editor-form" style="display:none;">
        <div class="form-group">
          <label>Display</label>
          <input type="text" id="edit-display" onchange="updateSelection()">
        </div>
        <div class="form-group">
          <label>Lore</label>
          <textarea id="edit-lore" rows="4" onchange="updateSelection()"></textarea>
        </div>
        <div class="form-group">
          <label>图标</label>
          <div style="display:flex;align-items:center;gap:8px;">
            <span id="edit-icon-display" class="icon-tag">未选择</span>
            <button class="btn btn-sm" onclick="openIconPicker()">选择</button>
          </div>
        </div>
        <div class="form-group">
          <label>附魔光效</label>
          <label class="toggle">
            <input type="checkbox" id="edit-glow" onchange="updateSelection()">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="form-group">
          <label>Page</label>
          <input type="number" id="edit-page" min="1" onchange="updateSelection()">
        </div>
        <div class="form-group">
          <button class="btn btn-danger btn-sm" onclick="deleteSelected()">删除此项</button>
        </div>
      </div>
      <div id="editor-empty" class="empty-hint">选中网格中的子项以编辑</div>
    </div>
  </div>
</div>

<div id="picker-overlay" class="overlay" style="display:none;">
  <div class="picker-box">
    <div class="picker-header">
      <span id="picker-title">选择</span>
      <button class="btn btn-sm" onclick="closePicker()">&#10005;</button>
    </div>
    <input type="text" id="picker-search" placeholder="搜索物品名或ID..." oninput="searchMaterials()">
    <div id="picker-results" class="picker-results"></div>
  </div>
</div>

<div id="context-menu" class="context-menu" style="display:none;">
  <div class="context-item" onclick="moveToPage()">移动到第N页</div>
</div>

<script src="editor.js"></script>
</body>
</html>
