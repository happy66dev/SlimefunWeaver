<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlimefunCustomGuide 配置编辑器</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="title">⚙ SlimefunCustomGuide 配置编辑器</span>
    <div class="toolbar-actions">
      <span id="save-status" class="save-status saved">已保存</span>
      <button class="btn" id="btn-discard" onclick="discardChanges()">↶ 放弃修改</button>
      <button id="btn-save" class="btn btn-primary" onclick="saveAll()">
        <span class="btn-icon">💾</span> 保存
      </button>
      <button class="btn" onclick="Dialog.alert('请在游戏内使用 /scg export 指令导出')">📤 导出</button>
    </div>
  </div>
  <div id="main">
    <div id="left-panel">
      <div class="panel-title">📂 分类结构</div>
      <div id="left-toolbar">
        <button class="btn btn-sm btn-accent" onclick="addCategory()">+ 分类</button>
        <button class="btn btn-sm btn-accent" onclick="addPlaceholder()">+ 占位</button>
        <button class="btn btn-sm btn-accent" onclick="addItem()">+ 物品</button>
      </div>
      <div id="tree-scroll">
        <div id="tree-container">
          <ul id="tree-root"></ul>
        </div>
      </div>
    </div>
    <div id="center-panel">
      <div id="grid-header">
        <span id="grid-title">请选择左侧分类</span>
        <div id="grid-page-controls" style="display:none;">
          <button class="btn btn-sm" onclick="prevPage()" title="上一页 (←)">◀</button>
          <span id="grid-page-info">第 1/1 页</span>
          <button class="btn btn-sm" onclick="nextPage()" title="下一页 (→)">▶</button>
        </div>
      </div>
      <div id="grid-container">
        <div id="grid"></div>
      </div>
      <div id="grid-empty" class="grid-empty-hint" style="display:none;">
        此分类下暂无内容<br>点击左侧 [+分类] [+占位] [+物品] 添加
      </div>
    </div>
    <div id="right-panel">
      <div class="panel-title">✏ 编辑属性</div>
      <div id="editor-form" style="display:none;">
        <div class="form-group">
          <label>显示名称 (Display)</label>
          <input type="text" id="edit-display" onchange="updateSelection()" placeholder="分类显示名称">
          <div id="display-preview" class="color-preview"></div>
        </div>
        <div class="form-group">
          <label>描述 (Lore)</label>
          <textarea id="edit-lore" rows="4" onchange="updateSelection()" placeholder="支持占位符: {page} {total_pages} {slot} {children_count} {items_count} {total_items_count}"></textarea>
          <div id="lore-preview" class="color-preview" style="min-height:20px;"></div>
        </div>
        <div class="form-group">
          <label>图标</label>
          <div class="icon-row">
            <span id="edit-icon-display" class="icon-tag">未选择</span>
            <button class="btn btn-sm" id="btn-pick-icon" onclick="openIconPicker()">选择图标</button>
          </div>
        </div>
        <div class="form-group form-row">
          <div>
            <label>附魔光效</label>
            <label class="toggle">
              <input type="checkbox" id="edit-glow" onchange="updateSelection()">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div>
            <label>页码 (Page)</label>
            <input type="number" id="edit-page" min="1" onchange="updateSelection()" style="width:72px;">
          </div>
        </div>
        <div class="form-group form-actions">
          <button class="btn btn-danger btn-sm" onclick="deleteSelected()">🗑 删除此项</button>
        </div>
      </div>
      <div id="editor-empty" class="empty-hint">
        <div class="empty-icon">📋</div>
        <div>点击网格或左侧分类</div>
        <div>即可编辑属性</div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<div id="modal-overlay" class="modal-overlay" style="display:none;"></div>

<div id="picker-overlay" class="modal-overlay" style="display:none;">
  <div class="picker-box">
    <div class="picker-header">
      <span id="picker-title">选择</span>
      <button class="btn btn-sm" onclick="closePicker()">✕</button>
    </div>
    <input type="text" id="picker-search" placeholder="搜索物品名或ID..." oninput="searchMaterials()">
    <div id="picker-results" class="picker-results">
      <div style="padding:16px;color:#666;text-align:center;">输入关键词开始搜索</div>
    </div>
  </div>
</div>

<div id="color-picker" class="color-picker" style="display:none;">
  <div class="color-picker-grid" id="color-picker-grid"></div>
  <div class="color-picker-formats" id="color-picker-formats"></div>
</div>

<div id="context-menu" class="context-menu" style="display:none;">
  <div class="context-item" onclick="moveToPage()">📄 移动到第N页</div>
</div>

<script src="editor.js"></script>
</body>
</html>
